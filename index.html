<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Sync</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1e293b;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.refresh {
  background: #38bdf8;
}

.container {
  padding: 10px;
}

.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 12px;
  border-radius: 15px;
}

.delete {
  background: red;
  margin-top: 8px;
}

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  width: 60px;
  height: 60px;
  font-size: 30px;
  border-radius: 50%;
}
</style>
</head>

<body>

<header>
  <h3>Quick Sync</h3>
  <button class="refresh" onclick="loadData()">Refresh</button>
</header>

<div class="container" id="list"></div>

<button class="fab" onclick="addItem()">+</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbyAvgfMRpbJJkW1_vyv75ta8PZnV2mJMcSJfwBX9SZ9EqCL9raCNZzmvu6C5QWKvCmPig/exec"; // paste your Apps Script URL

// 🔄 LOAD DATA
async function loadData() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.reverse().forEach(item => {
      const [id, content] = item;

      let card = document.createElement("div");
      card.className = "card";

      if (content.startsWith("http")) {
        card.innerHTML += `<a href="${content}" target="_blank">${content}</a>`;
      } else {
        card.innerHTML += `<p>${content}</p>`;
      }

      let delBtn = document.createElement("button");
      delBtn.innerText = "Delete";
      delBtn.className = "delete";
      delBtn.onclick = () => deleteItem(id);

      card.appendChild(delBtn);
      list.appendChild(card);
    });

  } catch (err) {
    alert("Error loading data");
    console.error(err);
  }
}

// ➕ ADD ITEM
async function addItem() {
  let text = prompt("Enter text or link:");
  if (!text) return;

  let url = API + "?action=add&content=" + encodeURIComponent(text) + "&type=" + (text.startsWith("http") ? "link" : "text");

  try {
    await fetch(url, { mode: "no-cors" }); // 🔥 IMPORTANT FIX
    alert("Added!");
    loadData();
  } catch (err) {
    alert("Error adding data");
  }
}

// 🗑 DELETE ITEM
async function deleteItem(id) {
  let url = API + "?action=delete&id=" + id;

  await fetch(url, { mode: "no-cors" }); // 🔥 IMPORTANT
  loadData();
}

// Initial load
loadData();
</script>

</body>
</html>
