<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Sync</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#1e293b;
}

#userEmail {
  font-size:12px;
  opacity:0.8;
}

/* LOGIN SCREEN */
#loginScreen {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}

.login-btn {
  background:#22c55e;
  padding:12px 20px;
  border-radius:10px;
}

/* LIST */
.container { padding:10px; }

.card {
  background:#1e293b;
  margin:10px 0;
  padding:12px;
  border-radius:15px;
  position:relative;
  animation:fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

/* CONTENT */
.card a, .card p {
  word-break:break-word;
  font-size:14px;
}

.card a { color:#38bdf8; }

/* COPY */
.copy-btn {
  position:absolute;
  top:8px;
  right:10px;
  font-size:11px;
  background:#334155;
  padding:4px 8px;
  border-radius:6px;
}

/* DELETE */
.delete {
  margin-top:10px;
  width:100%;
  background:red;
  border-radius:8px;
}

/* FAB */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  width:60px;
  height:60px;
  border-radius:50%;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% { transform:scale(1);}
  50% { transform:scale(1.1);}
  100% { transform:scale(1);}
}

/* SKELETON */
.skeleton {
  height:60px;
  background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);
  background-size:200%;
  animation:shimmer 1.2s infinite;
  border-radius:10px;
  margin:10px 0;
}

@keyframes shimmer {
  0%{background-position:-200%;}
  100%{background-position:200%;}
}

/* OVERLAY */
.overlay {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:flex;
  justify-content:center;
  align-items:center;
}

.spinner {
  border:4px solid #334155;
  border-top:4px solid #22c55e;
  border-radius:50%;
  width:40px;
  height:40px;
  animation:spin 1s linear infinite;
}

@keyframes spin {
  to { transform:rotate(360deg);}
}
</style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <h2>Quick Sync</h2>
  <button class="login-btn" onclick="login()">Login with Google</button>
</div>

<!-- APP -->
<div id="app" style="display:none;">

<header>
  <span id="userEmail"></span>
  <button onclick="logout()">Logout</button>
</header>

<div class="container" id="list"></div>
<div class="fab" onclick="addItem()">+</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://bslelkeatmwdmfmoockm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbGVsa2VhdG13ZG1mbW9vY2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3OTI0MjksImV4cCI6MjA5MDM2ODQyOX0.8PoBfDz9uYXqy1NTtODRSxSfHdVK3CG4QEvAzVYhodk";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

// LOGIN
async function login() {
  await client.auth.signInWithOAuth({
    provider:'google',
    options:{ redirectTo:location.href }
  });
}

// LOGOUT
async function logout() {
  await client.auth.signOut();
  location.reload();
}

// CHECK USER
async function init() {
  const { data:{ session } } = await client.auth.getSession();

  if(session){
    currentUser = session.user;

    document.getElementById("loginScreen").style.display="none";
    document.getElementById("app").style.display="block";

    document.getElementById("userEmail").innerText=currentUser.email;

    loadData();
    setupRealtime();

  } else {
    document.getElementById("loginScreen").style.display="flex";
    document.getElementById("app").style.display="none";
  }
}

init();

// LOAD DATA
async function loadData(){
  const list=document.getElementById("list");

  list.innerHTML = `<div class="skeleton"></div><div class="skeleton"></div>`;

  const { data } = await client
    .from("notes")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("id",{ascending:false});

  list.innerHTML="";

  data.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";

    let el;
    let t=item.content;

    if(t.startsWith("http")){
      el=document.createElement("a");
      el.href=t;
      el.target="_blank";
      el.innerText=t;
    }
    else if(/^\+?\d{10,13}$/.test(t)){
      el=document.createElement("a");
      el.href="tel:"+t;
      el.innerText="📱 "+t;
    }
    else if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t)){
      el=document.createElement("a");
      el.href="mailto:"+t;
      el.innerText="📧 "+t;
    }
    else if(/^[\w.-]+@[a-zA-Z]{2,}$/.test(t) && !t.includes(".")){
      el=document.createElement("a");
      el.href="upi://pay?pa="+t;
      el.innerText="💸 "+t;
    }
    else{
      el=document.createElement("p");
      el.innerHTML=t;
    }

    const copy=document.createElement("div");
    copy.className="copy-btn";
    copy.innerText="Copy";
    copy.onclick=(e)=>{
      e.stopPropagation();
      navigator.clipboard.writeText(t);
    };

    const del=document.createElement("button");
    del.className="delete";
    del.innerText="Delete";
    del.onclick=()=>deleteItem(item.id,card);

    card.appendChild(copy);
    card.appendChild(el);
    card.appendChild(del);
    list.appendChild(card);
  });
}

// ADD
async function addItem(){
  let t=prompt("Enter text");
  if(!t) return;

  await client.from("notes").insert([
    {content:t, user_id:currentUser.id}
  ]);

  loadData();
}

// DELETE
async function deleteItem(id,card){
  card.style.opacity="0";
  setTimeout(async()=>{
    await client.from("notes").delete().eq("id",id);
    card.remove();
  },200);
}

// REALTIME
function setupRealtime(){
  client.channel('notes')
  .on('postgres_changes',{event:'INSERT',schema:'public',table:'notes'},loadData)
  .on('postgres_changes',{event:'DELETE',schema:'public',table:'notes'},loadData)
  .subscribe();
}

</script>

</body>
</html>
