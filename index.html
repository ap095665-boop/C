<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Sync</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1e293b;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.refresh {
  background: #38bdf8;
}

.container {
  padding: 10px;
}

.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 12px;
  border-radius: 15px;
}

.delete {
  background: red;
  margin-top: 8px;
}

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  width: 60px;
  height: 60px;
  font-size: 30px;
  border-radius: 50%;
}
</style>
</head>

<body>

<header>
  <h3>Quick Sync</h3>
  <button class="refresh" onclick="loadData()">Refresh</button>
</header>

<div class="container" id="list"></div>

<button class="fab" onclick="addItem()">+</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbwxA9ymWWzQ9IcTp5yQJZ723c8W8cbu3RzubyO3EZhsznGWcoli2rIr8nQ-n1K8Jn769Q/exec"; // 👈 paste your Apps Script URL here

// Load data from Google Sheet
async function loadData() {
  try {
    const res = await fetch(API);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.reverse().forEach(item => {
      const [id, content] = item;

      let card = document.createElement("div");
      card.className = "card";

      if (content.startsWith("http")) {
        card.innerHTML += `<a href="${content}" target="_blank">${content}</a>`;
      } else {
        card.innerHTML += `<p>${content}</p>`;
      }

      let delBtn = document.createElement("button");
      delBtn.innerText = "Delete";
      delBtn.className = "delete";
      delBtn.onclick = () => deleteItem(id);

      card.appendChild(delBtn);
      list.appendChild(card);
    });

  } catch (err) {
    console.error(err);
    alert("Error loading data");
  }
}

// Add new item
async function addItem() {
  let text = prompt("Enter text or link:");
  if (!text) return;

  try {
    await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "add",
        content: text,
        type: text.startsWith("http") ? "link" : "text"
      })
    });

    alert("Added successfully!");
    loadData();

  } catch (err) {
    console.error(err);
    alert("Error adding data");
  }
}

// Delete item
async function deleteItem(id) {
  try {
    await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        action: "delete",
        id: id
      })
    });

    loadData();

  } catch (err) {
    console.error(err);
    alert("Error deleting data");
  }
}

// Initial load
loadData();
</script>

</body>
</html>
