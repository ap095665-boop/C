<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Quick Sync</title>

<style>
body { font-family: Arial; background:#0f172a; color:white; margin:0; }
header { display:flex; justify-content:space-between; padding:15px; background:#1e293b; align-items:center; }
button { padding:10px; border:none; border-radius:10px; cursor:pointer; }
.refresh { background:#38bdf8; }
.container { padding:10px; }

.card {
  background:#1e293b;
  margin:10px 0;
  padding:12px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:8px;
  position:relative;
}

.card p,.card a {
  max-height:100px;
  overflow-y:auto;
  word-break:break-word;
  overflow-wrap:anywhere;
  font-size:14px;
}

.card a { color:#38bdf8; text-decoration:none; }

.delete { background:red; margin-top:5px; }

.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  width:60px;
  height:60px;
  font-size:30px;
  border-radius:50%;
}

.copy-btn {
  position:absolute;
  bottom:8px;
  right:10px;
  font-size:12px;
  background:#334155;
  padding:4px 8px;
  border-radius:6px;
  opacity:0.7;
}

.overlay {
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(15,23,42,0.9);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:999;
  flex-direction:column;
}

.spinner {
  border:4px solid #334155;
  border-top:4px solid #22c55e;
  border-radius:50%;
  width:50px;
  height:50px;
  animation:spin 1s linear infinite;
}

@keyframes spin { to { transform:rotate(360deg);} }
.success { color:#22c55e; font-weight:bold; }
</style>
</head>

<body>

<header>
  <h3>Quick Sync</h3>
  <div>
    <span id="userEmail" style="font-size:12px;"></span>
    <button onclick="logout()">Logout</button>
    <button class="refresh" onclick="loadData()">Refresh</button>
  </div>
</header>

<div class="container" id="list"></div>

<button id="loginBtn" onclick="login()">Login with Google</button>
<button class="fab" onclick="addItem()">+</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://bslelkeatmwdmfmoockm.supabase.co";
const SUPABASE_KEY = "YOUR_REAL_KEY";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 🔐 LOGIN
async function login() {
  await client.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: 'https://ap095665-boop.github.io/C'
    }
  });
}

// 🔓 LOGOUT
async function logout() {
  await client.auth.signOut();
  location.reload();
}

// 👤 CHECK USER
async function checkUser() {
  const { data: { session } } = await client.auth.getSession();

  const emailEl = document.getElementById("userEmail");
  const loginBtn = document.getElementById("loginBtn");

  if (session) {
    const user = session.user;

    emailEl.innerText = user.email;
    loginBtn.style.display = "none";

    setupRealtime();
    loadData();

  } else {
    emailEl.innerText = "";
    loginBtn.style.display = "block";
    document.getElementById("list").innerHTML = "Please login first";
  }
}

checkUser();

// 🔄 LOAD DATA
async function loadData() {
  const list = document.getElementById("list");

  const { data: { user } } = await client.auth.getUser();
  if (!user) return;

  const { data, error } = await client
    .from("notes")
    .select("*")
    .eq("user_id", user.id)
    .order("id", { ascending:false });

  if (error) return;

  list.innerHTML = "";

  data.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";

    const text = item.content || "";
    let contentEl;

    // SMART DETECTION (FULL RESTORED)
    if (text.startsWith("http")) {
      contentEl = document.createElement("a");
      contentEl.href = text;
      contentEl.target = "_blank";
      contentEl.innerText = text;
    }
    else if (/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(text)) {
      contentEl = document.createElement("a");
      contentEl.href = "mailto:" + text;
      contentEl.innerText = "📧 " + text;
    }
    else if (/^\+?\d{10,13}$/.test(text)) {
      contentEl = document.createElement("a");
      contentEl.href = "tel:" + text;
      contentEl.innerText = "📱 " + text;
    }
    else if (/^[\w.-]+@[a-zA-Z]{2,}$/.test(text) && !text.includes(".")) {
      contentEl = document.createElement("a");
      contentEl.href = "upi://pay?pa=" + text;
      contentEl.innerText = "💸 " + text;
    }
    else {
      contentEl = document.createElement("p");
      let formatted = text;

      formatted = formatted.replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>');
      formatted = formatted.replace(/\b(\+?\d{10,13})\b/g,'<a href="tel:$1">📱 $1</a>');
      formatted = formatted.replace(/\b([^\s@]+@[^\s@]+\.[^\s@]+)\b/g,'<a href="mailto:$1">📧 $1</a>');
      formatted = formatted.replace(/\b([\w.-]+@[a-zA-Z]{2,})\b/g,(m)=> m.includes('.')?m:`<a href="upi://pay?pa=${m}">💸 ${m}</a>`);

      contentEl.innerHTML = formatted;
    }

    const del = document.createElement("button");
    del.innerText = "Delete";
    del.className = "delete";
    del.onclick = () => deleteItem(item.id, card);

    const copyBtn = document.createElement("div");
    copyBtn.innerText = "Copy";
    copyBtn.className = "copy-btn";
    copyBtn.onclick = (e)=>{
      e.stopPropagation();
      navigator.clipboard.writeText(text);
      showToast("Copied!");
    };

    card.appendChild(copyBtn);
    card.appendChild(contentEl);
    card.appendChild(del);
    list.appendChild(card);
  });
}

// ➕ ADD
async function addItem() {
  let text = prompt("Enter text or link:");
  if (!text) return;

  showLoading("Adding...");

  const { data:{ user } } = await client.auth.getUser();

  await client.from("notes").insert([
    { content:text, user_id:user.id }
  ]);

  showSuccess("Added ✓");
  loadData();
}

// 🗑 DELETE
async function deleteItem(id, card) {
  card.classList.add("removing");

  setTimeout(async () => {
    await client.from("notes").delete().eq("id", id);
    card.remove();
  }, 300);
}

// ⚡ REALTIME FIXED
function setupRealtime() {
  client.channel('notes-changes')

  .on('postgres_changes',{
    event:'INSERT', schema:'public', table:'notes'
  }, ()=> loadData())

  .on('postgres_changes',{
    event:'DELETE', schema:'public', table:'notes'
  }, ()=> loadData())

  .subscribe();
}

// 🔔 Toast
function showToast(msg){
  const t=document.createElement("div");
  t.innerText=msg;
  t.style.cssText="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#22c55e;padding:10px;border-radius:10px;";
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1000);
}

// 🔄 Loading
function showLoading(msg){
  const o=document.createElement("div");
  o.className="overlay";
  o.id="overlay";
  o.innerHTML=`<div class="spinner"></div><div>${msg}</div>`;
  document.body.appendChild(o);
}

// ✅ Success
function showSuccess(msg){
  const o=document.getElementById("overlay");
  if(o){
    o.innerHTML=`<div class="success">${msg}</div>`;
    setTimeout(()=>o.remove(),1000);
  }
}

</script>
</body>
</html>
