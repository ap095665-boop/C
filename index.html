<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Sync</title>

<style>
body { margin:0; font-family:Arial; background:#0f172a; color:white; }

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:#1e293b;
}

#userEmail {
  font-size:12px;
  max-width:140px;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* LOGIN */
#loginScreen {
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  gap:20px;
}

.login-btn {
  background:#22c55e;
  padding:12px 20px;
  border-radius:10px;
}

/* LIST */
.container { padding:10px; }

/* CARD */
.card {
  background:#1e293b;
  margin:10px 0;
  padding:12px;
  border-radius:15px;
  position:relative;
  animation:fadeIn 0.25s ease;
  overflow:hidden;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(10px);}
  to {opacity:1;}
}

.card a, .card p {
  word-break:break-word;
  font-size:14px;
  max-height:120px;
  overflow:auto;
}

.card a { color:#38bdf8; }

/* COPY */
.copy-btn {
  position:absolute;
  top:8px;
  right:10px;
  font-size:10px;
  background:#334155;
  padding:3px 6px;
  border-radius:5px;
}

/* FAB */
.fab {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#22c55e;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
}

/* SKELETON */
.skeleton {
  height:60px;
  background:linear-gradient(90deg,#1e293b 25%,#334155 50%,#1e293b 75%);
  background-size:200%;
  animation:shimmer 1.2s infinite;
  border-radius:10px;
  margin:10px 0;
}

@keyframes shimmer {
  0%{background-position:-200%;}
  100%{background-position:200%;}
}

/* TOAST */
.toast {
  position:fixed;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  background:#22c55e;
  padding:8px 12px;
  border-radius:8px;
  font-size:13px;
}

/* SWIPE DELETE */
.card.removing {
  transition:0.3s;
  transform:translateX(100%);
  opacity:0;
}
</style>
</head>

<body>

<div id="loginScreen">
  <h2>Quick Sync</h2>
  <button class="login-btn" onclick="login()">Login with Google</button>
</div>

<div id="app" style="display:none;">
<header>
  <span id="userEmail"></span>
  <button onclick="logout()">Logout</button>
</header>

<div id="list" class="container"></div>
<div class="fab" onclick="addItem()">+</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>

const SUPABASE_URL = "https://bslelkeatmwdmfmoockm.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzbGVsa2VhdG13ZG1mbW9vY2ttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3OTI0MjksImV4cCI6MjA5MDM2ODQyOX0.8PoBfDz9uYXqy1NTtODRSxSfHdVK3CG4QEvAzVYhodk";
const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

/* LOGIN */
async function login(){
  await client.auth.signInWithOAuth({
    provider:'google',
    options:{
      redirectTo:location.origin + location.pathname,
      queryParams:{ prompt:'select_account' }
    }
  });
}

/* LOGOUT */
async function logout(){
  await client.auth.signOut();
  currentUser=null;
  showLogin();
}

/* INIT */
async function init(){
  const { data:{ session } } = await client.auth.getSession();

  if(session) handleLogin(session.user);
  else showLogin();

  client.auth.onAuthStateChange((e,s)=>{
    if(e==="SIGNED_IN") handleLogin(s.user);
    if(e==="SIGNED_OUT") showLogin();
  });
}

/* UI HANDLERS */
function handleLogin(user){
  currentUser=user;
  loginScreen.style.display="none";
  app.style.display="block";
  userEmail.innerText=user.email;
  loadData();
  setupRealtime();
}

function showLogin(){
  loginScreen.style.display="flex";
  app.style.display="none";
}

/* LOAD */
async function loadData(){
  const list=document.getElementById("list");

  list.innerHTML=`<div class="skeleton"></div><div class="skeleton"></div>`;

  if(!currentUser) return;

  const { data } = await client
    .from("notes")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("id",{ascending:false});

  list.innerHTML="";

  if(!data.length){
    list.innerHTML="No data";
    return;
  }

  data.forEach(item=>{
    const card=document.createElement("div");
    card.className="card";

    let t=item.content;
    let el;

    if(t.startsWith("http")){
      el=document.createElement("a");
      el.href=t;
      el.target="_blank";
      el.innerText=t;
    }
    else if(/^\+?\d{10,13}$/.test(t)){
      el=document.createElement("a");
      el.href="tel:"+t;
      el.innerText="📱 "+t;
    }
    else if(/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(t)){
      el=document.createElement("a");
      el.href="mailto:"+t;
      el.innerText="📧 "+t;
    }
    else if(/^[\w.-]+@[a-zA-Z]{2,}$/.test(t) && !t.includes(".")){
      el=document.createElement("a");
      el.href="upi://pay?pa="+t;
      el.innerText="💸 "+t;
    }
    else{
      el=document.createElement("p");
      el.innerHTML=t
        .replace(/(https?:\/\/[^\s]+)/g,'<a href="$1" target="_blank">$1</a>')
        .replace(/\b(\+?\d{10,13})\b/g,'<a href="tel:$1">📱 $1</a>')
        .replace(/\b([^\s@]+@[^\s@]+\.[^\s@]+)\b/g,'<a href="mailto:$1">📧 $1</a>')
        .replace(/\b([\w.-]+@[a-zA-Z]{2,})\b/g,m=>m.includes('.')?m:`<a href="upi://pay?pa=${m}">💸 ${m}</a>`);
    }

    const copy=document.createElement("div");
    copy.className="copy-btn";
    copy.innerText="Copy";
    copy.onclick=(e)=>{
      e.stopPropagation();
      navigator.clipboard.writeText(t);
      showToast("Copied!");
    };

    card.appendChild(copy);
    card.appendChild(el);

    /* SWIPE */
    let startX=0;
    card.addEventListener("touchstart",e=>{
      startX=e.touches[0].clientX;
    });

    card.addEventListener("touchend",async e=>{
      let diff=e.changedTouches[0].clientX-startX;

      if(diff>120){
        if(confirm("Delete this item?")){
          card.classList.add("removing");
          setTimeout(async()=>{
            await client.from("notes").delete().eq("id",item.id);
            card.remove();
          },200);
        }
      }
    });

    list.appendChild(card);
  });
}

/* ADD */
async function addItem(){
  let t=prompt("Enter text");
  if(!t) return;

  await client.from("notes").insert([
    {content:t,user_id:currentUser.id}
  ]);

  loadData();
}

/* REALTIME */
function setupRealtime(){
  client.channel('notes')
  .on('postgres_changes',{event:'INSERT',schema:'public',table:'notes'},loadData)
  .on('postgres_changes',{event:'DELETE',schema:'public',table:'notes'},loadData)
  .subscribe();
}

/* TOAST */
function showToast(msg){
  const t=document.createElement("div");
  t.className="toast";
  t.innerText=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),1000);
}

init();

</script>
</body>
</html>
