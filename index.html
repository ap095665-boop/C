<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quick Sync</title>

<style>
body {
  font-family: Arial;
  background: #0f172a;
  color: white;
  margin: 0;
}

header {
  display: flex;
  justify-content: space-between;
  padding: 15px;
  background: #1e293b;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.refresh {
  background: #38bdf8;
}

.container {
  padding: 10px;
}

.card {
  background: #1e293b;
  margin: 10px 0;
  padding: 12px;
  border-radius: 15px;
}

.delete {
  background: red;
  margin-top: 8px;
}

.fab {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #22c55e;
  width: 60px;
  height: 60px;
  font-size: 30px;
  border-radius: 50%;
}
.card p {
  max-height: 100px;       /* limit height */
  overflow-y: auto;        /* scroll vertically */
  word-break: break-word;  /* break long words */
  padding-right: 5px;
}
  /* 🔄 Skeleton loader */
.skeleton {
  background: linear-gradient(90deg, #1e293b 25%, #334155 50%, #1e293b 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  height: 60px;
  border-radius: 12px;
  margin: 10px 0;
}

@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ✨ Fade in */
.card {
  animation: fadeIn 0.4s ease;
  transition: transform 0.2s ease, opacity 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* 🗑 Delete animation */
.card.removing {
  animation: removeAnim 0.3s forwards;
}

@keyframes removeAnim {
  to {
    opacity: 0;
    transform: translateX(100px) scale(0.9);
  }
}

/* 👆 Button press effect */
button:active {
  transform: scale(0.95);
}
/* 🔥 Overlay loading */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(15, 23, 42, 0.9);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  flex-direction: column;
}

/* Spinner */
.spinner {
  border: 4px solid #334155;
  border-top: 4px solid #22c55e;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  animation: spin 1s linear infinite;
  margin-bottom: 10px;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* Success text */
.success {
  color: #22c55e;
  font-weight: bold;
  animation: fadeIn 0.3s ease;
}
  
</style>
</head>

<body>

<header>
  <h3>Quick Sync</h3>
  <button class="refresh" onclick="loadData()">Refresh</button>
</header>

<div class="container" id="list"></div>

<button class="fab" onclick="addItem()">+</button>

<script>
const API = "https://script.google.com/macros/s/AKfycbwLUPGgV7ig_2lygVuZmGIJqKC0r936b9iY8R_EncExu9rReTT3_U9pd3_3sqvlVqQXhA/exec"; // paste your Apps Script URL

// 🔄 LOAD DATA
async function loadData() {
  const list = document.getElementById("list");

// 🔥 skeleton loading UI
list.innerHTML = `
  <div class="skeleton"></div>
  <div class="skeleton"></div>
  <div class="skeleton"></div>
`;
  try {
    const res = await fetch(API + "?t=" + Date.now(), {
      method: "GET",
      redirect: "follow"
    });

    const text = await res.text();

    console.log("RAW RESPONSE:", text);

    if (!text || text.startsWith("<!DOCTYPE")) {
      throw new Error("Invalid response");
    }

    const data = JSON.parse(text);

    list.innerHTML = "";

    if (!data.length) {
      list.innerHTML = "No data yet";
      return;
    }

    data.reverse().forEach(item => {
  const [id, content] = item;

  const card = document.createElement("div");
  card.className = "card";

  let contentEl;

  if (content.startsWith("http")) {
    contentEl = document.createElement("a");
    contentEl.href = content;
    contentEl.target = "_blank";
    contentEl.innerText = content;
  } else {
    contentEl = document.createElement("p");
    contentEl.innerText = content;
  }

  const del = document.createElement("button");
  del.innerText = "Delete";
  del.className = "delete";
  del.onclick = () => deleteItem(id, del);

  card.appendChild(contentEl);
  card.appendChild(del);
  list.appendChild(card);
});

  } catch (err) {
    console.error("FETCH ERROR:", err);

    // 🔥 fallback retry
    setTimeout(() => {
      list.innerHTML = "Retrying...";
      loadData();
    }, 1500);
  }
}
// ➕ ADD ITEM
async function addItem() {
  let text = prompt("Enter text or link:");
  if (!text) return;

  let url = API + "?action=add&content=" + encodeURIComponent(text) + "&type=" + (text.startsWith("http") ? "link" : "text");

  try {
    // 🔥 show animation
    showLoading("Adding...");

    await fetch(url, { mode: "no-cors" });

    // 🔥 show success
    showSuccess("Added ✓");

    setTimeout(() => {
      loadData();
    }, 500);

  } catch (err) {
    alert("Error adding data");
  }
}

// 🗑 DELETE ITEM
async function deleteItem(id, btn) {
  const card = btn.parentElement;

  // 🔥 animate first
  card.classList.add("removing");

  setTimeout(async () => {
    let url = API + "?action=delete&id=" + id;

    await fetch(url, { mode: "no-cors" });

    card.remove(); // remove from UI
  }, 300);
}

// Initial load
loadData();

function showLoading(msg = "Processing...") {
  const overlay = document.createElement("div");
  overlay.className = "overlay";
  overlay.id = "overlay";

  overlay.innerHTML = `
    <div class="spinner"></div>
    <div>${msg}</div>
  `;

  document.body.appendChild(overlay);
}

function showSuccess(msg = "Done!") {
  const overlay = document.getElementById("overlay");

  if (overlay) {
    overlay.innerHTML = `<div class="success">${msg}</div>`;
    setTimeout(() => overlay.remove(), 1000);
  }
}
  
</script>

</body>
</html>
